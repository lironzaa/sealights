<ng-container [formArrayName]="customFormArrayName">
  <ng-container [formGroupName]="index">
    <mat-form-field>
      <mat-label>{{label}}</mat-label>
      <mat-select (selectionChange)="itemSelected($event.value)" [formControlName]="customFormControlName">
        <mat-option *ngFor="let item of items" [value]="item">
          {{item.name}}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </ng-container>
</ng-container>
